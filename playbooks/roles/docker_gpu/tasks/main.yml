---
- name: Install Docker CE packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ docker_users }}"
  ignore_errors: true

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name:
      - nvidia-container-toolkit
      - nv-docker-options
    state: present

- name: Check if MOK key is enrolled
  ansible.builtin.command: mokutil --test-key /var/lib/shim-signed/mok/MOK.der
  register: mok_status
  changed_when: false
  failed_when: false

- name: Queue MOK key for enrollment
  ansible.builtin.shell: printf '%s\n%s\n' "{{ mok_password }}" "{{ mok_password }}" | mokutil --import /var/lib/shim-signed/mok/MOK.der
  when:
    - mok_password | length > 0
    - "'is not enrolled' in mok_status.stdout"
  no_log: true

- name: Warn - manual MOK enrollment required after reboot
  ansible.builtin.debug:
    msg: >
      ACTION REQUIRED: MOK key queued. Reboot and watch the console for the blue
      "Perform MOK management" screen. Select Enroll MOK -> Continue -> enter the
      mok_password -> Yes -> Reboot. The NVIDIA kernel modules will not load on
      Secure Boot systems until this is done.
  when:
    - mok_password | length > 0
    - "'is not enrolled' in mok_status.stdout"

- name: Warn - MOK enrollment skipped (no mok_password set)
  ansible.builtin.debug:
    msg: >
      Secure Boot MOK enrollment skipped. If Secure Boot is enabled, pass
      -e mok_password=<password> and re-run, then enroll at the console on next reboot.
  when:
    - mok_password | length == 0
    - "'is not enrolled' in mok_status.stdout"

- name: Write Docker daemon config with NVIDIA as default runtime
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
          "default-runtime": "nvidia",
          "runtimes": {
              "nvidia": {
                  "args": [],
                  "path": "nvidia-container-runtime"
              }
          }
      }
    owner: root
    group: root
    mode: '0644'
  notify: restart docker

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Install cron
  ansible.builtin.apt:
    name: cron
    state: present

- name: Enable and start cron
  ansible.builtin.systemd:
    name: cron
    enabled: yes
    state: started

- name: Create /opt/actions-runner directory
  ansible.builtin.file:
    path: /opt/actions-runner
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy weekly docker prune script
  ansible.builtin.copy:
    dest: /opt/actions-runner/prune-docker.sh
    content: |
      #!/bin/bash
      # Weekly Docker system prune - removes unused images, containers, and networks.
      # Volumes are excluded to protect persistent data (model cache, etc.).
      set -euo pipefail
      echo "[docker-prune] starting at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      docker system prune -af
      echo "[docker-prune] done at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
    owner: root
    group: root
    mode: '0755'

- name: Schedule weekly docker prune (Sunday 03:00 UTC)
  ansible.builtin.copy:
    dest: /etc/cron.d/docker-prune
    content: |
      # Weekly Docker system prune - see /opt/actions-runner/prune-docker.sh
      0 3 * * 0 root /opt/actions-runner/prune-docker.sh >> /var/log/docker-prune.log 2>&1
    owner: root
    group: root
    mode: '0644'
