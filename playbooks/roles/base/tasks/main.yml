---
- name: Update apt cache and fully upgrade
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
    cache_valid_time: 0

- name: Purge unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: absent
    purge: yes

- name: Disable apt daily timers
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: no
  loop:
    - apt-daily.timer
    - apt-daily-upgrade.timer
  ignore_errors: yes

- name: Remove unused packages
  ansible.builtin.apt:
    autoremove: yes

- name: Install fwupd
  ansible.builtin.apt:
    name: fwupd
    state: present

- name: Refresh fwupd metadata
  ansible.builtin.command: fwupdmgr refresh --force
  changed_when: false
  failed_when: false

- name: Disable Wi-Fi via udev rule
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/99-disable-wifi.rules
    content: 'SUBSYSTEM=="net", ACTION=="add", KERNEL=="wlP9s9", RUN+="/sbin/ip link set %k down"\n'
    owner: root
    group: root
    mode: '0644'

- name: Bring Wi-Fi interface down immediately
  ansible.builtin.command: ip link set wlP9s9 down
  changed_when: false
  failed_when: false

- name: Disable swap - on UMA systems swap + GPU DMA causes hard lockups (NVIDIA recommendation)
  ansible.builtin.command: swapoff -a
  changed_when: false
  failed_when: false

- name: Disable swap in fstab (persist across reboots)
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\bswap\b.*)$'
    replace: '#\1'

- name: Set vm.swappiness to 10
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "10"
    sysctl_file: /etc/sysctl.d/99-gb10.conf
    reload: yes

- name: Fix networkd-wait-online - wait for any interface not all
  ansible.builtin.file:
    path: /etc/systemd/system/systemd-networkd-wait-online.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Fix networkd-wait-online - write --any override
  ansible.builtin.copy:
    dest: /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
    content: |
      [Service]
      ExecStart=
      ExecStart=/lib/systemd/systemd-networkd-wait-online --any
    owner: root
    group: root
    mode: '0644'
  notify: systemd daemon-reload

- name: Set required kernel parameters for PCIe/GPU stability
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="console=tty0 pcie_port_pm=off initcall_blacklist=tegra234_cbb_init pci=pcie_bus_safe"'
  notify: update grub

- name: Enable persistent systemd journal (survives reboots/crashes)
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?Storage='
    line: 'Storage=persistent'
  notify: restart journald

# The GB10/GX10 firmware arms the ARM SBSA generic watchdog at boot (~20 min,
# 2-stage) and expects the OS to take ownership of it. DGX OS does NOT load the
# sbsa_gwdt driver by default, so the watchdog is never serviced and hard-resets
# the box every ~20 min - even when completely idle (no docker/GPU workload).
# Loading the driver makes the kernel adopt the running watchdog and keep it
# alive while healthy (CONFIG_WATCHDOG_HANDLE_BOOT_ENABLED); a genuine kernel
# freeze stops the keepalive worker and the HW watchdog resets the box within
# ~10s, so real-hang recovery is retained.
- name: Load SBSA generic watchdog driver at boot (stops ~20-min firmware watchdog resets)
  ansible.builtin.copy:
    dest: /etc/modules-load.d/sbsa_gwdt.conf
    content: |
      # GB10/GX10 firmware arms the SBSA generic watchdog; the OS must own it or
      # the unserviced watchdog hard-resets the box every ~20 min. See base role.
      sbsa_gwdt
    owner: root
    group: root
    mode: '0644'

- name: Load SBSA generic watchdog driver now
  ansible.builtin.command: modprobe sbsa_gwdt
  changed_when: false
  failed_when: false

- name: Check for available firmware updates
  ansible.builtin.command: fwupdmgr get-updates
  register: fwupd_check
  changed_when: false
  failed_when: false

- name: Apply firmware updates
  ansible.builtin.command: fwupdmgr update --no-reboot-check
  when: "'No updates available' not in fwupd_check.stdout"
  notify: reboot for firmware
