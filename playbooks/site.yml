---
# site.yml - Full GB10 setup. Run after bootstrap.yml has created the automation user.
#
# Full run:
#   ansible-playbook site.yml
#
# With Secure Boot MOK enrollment (pick a short throwaway password - you only need
# to remember it long enough to type it at the UEFI console on the next reboot):
#   ansible-playbook site.yml -e 'mok_password=<one-time-password>'
#   To avoid shell history exposure, prefix with a space (HISTCONTROL=ignorespace)
#   or use: ansible-playbook site.yml -e @/tmp/mok.yml  (file contains mok_password: ...)
#   Then watch the console on the next reboot for the blue MOK management screen.
#
# Single role:
#   ansible-playbook site.yml --tags nvidia_stack
#
# Dry run:
#   ansible-playbook site.yml --check

- name: GB10 full setup
  hosts: "{{ target | default('gb10') }}"
  become: true

  roles:
    - role: base
      tags: base

    - role: nvidia_stack
      tags: nvidia_stack

    - role: docker_gpu
      tags: docker_gpu

    # dual_node: run against both nodes simultaneously to set up CX-7 networking,
    # SSH key exchange, and NCCL build. Requires 2+ hosts in the target group.
    # ansible-playbook site.yml --tags dual_node
    - role: dual_node
      tags: dual_node

    # vllm_cluster: deploy vLLM Ray cluster (head on gb10-1, worker on gb10-2).
    # Requires NFS mount at /mnt/llm/models/huggingface on both nodes.
    # ansible-playbook site.yml --tags vllm -e vllm_hf_token=hf_...
    - role: vllm_cluster
      tags: vllm
